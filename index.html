<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Jogos retrô</title>
    <link rel="stylesheet" href="./portal.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Jogos retrô</p>
        <h1>Jogos retrô</h1>
        <p class="lead">
          Um hub simples para reunir seus jogos retrô em um só lugar, com destaque para a aventura em pixel art.
        </p>

        <div class="heroMeta">
          <div>
            <span>Catálogo</span>
            <strong id="gameCount">2 jogos</strong>
          </div>
          <div>
            <span>Status</span>
            <strong>Pronto para jogar</strong>
          </div>
        </div>

        <div class="heroArt">
          <img src="./assets/retro-arcade.png" alt="Arte retrô com fliperama e nave espacial" />
        </div>
      </section>

      <section class="spotlight">
        <div class="previewTop">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
          <span>Destaque</span>
        </div>

        <div class="spotlightContent">
          <div id="gamesGrid" class="gamesGrid"></div>

          <div class="spotlightStats" aria-label="Resumo do portal">
            <div class="statPill">
              <span>Estilo</span>
              <strong>Pixel arcade</strong>
            </div>
            <div class="statPill">
              <span>Controles</span>
              <strong>Desktop e mobile</strong>
            </div>
            <div class="statPill">
              <span>Recursos</span>
              <strong>Pause, power-ups e ondas</strong>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="./portal.js"></script>
  </body>
</html>
